body:
  text: 爾時金剛手白佛言世尊若有諸善男子善女人入此大悲藏生大曼荼羅王三昧耶者彼獲幾所福德聚如是說已佛告金剛手言祕密主從初發心乃至成如來所有福德聚是善男子善女人福德聚與彼正等祕密主以此法門當如是知彼善男子善女人從如來口生佛心之子若是善男子善女人所在方所即為有佛施作佛事是故祕密主若樂欲供養佛者當供養此善男子善女人若樂欲見佛即當觀彼能摧破魔軍利樂一切是故汝等欲得一切如來真實智慧者應當一心修行此法能速成就一切智故法華云淨心信敬佛淨名云從無量功德智慧生加持五色線索繫其左臂真言曰一唵摩訶引嚩日囉迦嚩遮嚩日哩俱嚕嚩日囉嚩日囉憾南無金剛界大聖毗盧遮那如來南無東方阿閦如來南無南方寶生如來南無西方觀自在王如來南無北方不空成就如來南無普賢金剛薩埵等盡虛空遍法界微塵剎土中帝綱重重三際一切菩薩摩訶薩次復心念此密語護持諸弟子密語曰二唵引一摩訶引日囉二合迦去遮嚩日哩二合矩嚧日囉二合𮧬日囉二合菡引次加持塗香塗諸弟子掌中真言曰三唵引𮧬日囉二合巘弟虐塗香時告言願汝等悉具一切如來戒定慧解脫解脫知見之香次加持白華授與弟子真言曰四唵引𮧬日囉二合補瑟閉二合唵告言願汝等得一切如來無盡相海次加持香爐熏弟子雙手真言曰五唵𮧬日囉二合杜引閉惡告言願汝等得一切如來無盡大悲滋潤妙色次加持燈令弟子視真言曰六唵𮧬囉二合路引計引儞翼二合引告言願汝等獲得一切如來等虛空界智慧光明金剛劍真言加持牛五味乳酪蘇糞尿相和澄嚧漉服之七唵嚩日囉二合嗢那羯吒令飲真言八唵摩訶入嚩攞吽次以摧破一切煩惱隨煩惱諸佛甚深智慧金剛劍真言或部心真言加持烏曇阿說陀齒木十指量香水洗塗熏纏華於根以一奉獻一切諸佛餘與行者以不動明加持一百八如來牙加持次授於齒木却至授戒處嚼小頭告問擲齒木得何方便是彼方聖人告如是偈言汝獲無等利位同於大我一切諸如來此教諸菩薩皆以攝受汝成辦於大事汝等於明日當得大乘生擲之驗其相令蹲踞坐嚼面東或北向外不成就向內成就若遠却夾久成就東方上西中南下四方多是彼部三結修多羅當繫等持臂五色線五佛加持貫攝萬行令住等持臂歷經僧祇令不失壞故名金剛結次夜行赤衣覆其首以真言及不動尊真言加持一百八遍掩閉一切諸惡趣門能開清淨五眼成就結三昧耶契口授此密言九三昧耶薩怛鑁三合某即令竪忍願二度為針引入壇門中三遍授此密語曰金剛鉤真言引入十三昧耶吽引應告言汝今已入如來眷屬部中我今令汝生金剛智汝由此智故當得一切如來最勝成就及諸世間出世間一切悉地事業皆悉成就汝又不應於未入壇場受灌頂人前說此法事汝若說者非但違失汝三昧耶亦自招殃咎耳師應堅結金剛薩埵慧契置弟子頂上告言此是金剛薩埵三昧耶契汝若輒向未受灌頂人說者令汝頭破裂汝於我所莫生輕慢應當深生敬信汝於我身當如金剛薩埵想我所教誨當盡奉行若不爾者自招殃禍或令中夭死墮地獄汝應慎之師欲令金剛薩埵入其弟子身心即結金剛薩埵契告言此是金剛薩埵三昧耶願入汝身心成無上金剛智誦此密語曰十一唵引𮧬日囉二合引吠引奢引噁次結忿怒金剛拳以忍願二度相鉤誦上大乘三昧耶百字密語唱已掣開上契由此密語功能力故能令弟子入金剛智證殊勝慧由此智故悉能獲得知一切衆生若干種心能知世間三種事業能堅固菩提心能滅一切苦惱離一切怖畏一切衆惡不能為害一切如來同共加持一切悉地皆悉現前諸未曾有安樂勝事不求自得汝當深自慶幸我今為汝略說功德勝事於一切地位諸解脫門神通門三摩地門陀羅尼門波羅蜜門十力無畏不共法等由此法故悉當獲得所有未曾見聞百千契經甚深義理自然能解汝當不久自當證得諸佛真實智慧何況下劣諸餘悉地作是語已次當問言汝見何等境界此下有摧罪明等記之次第摧破諸罪已復想以諸佛光明淨彼身心四方阿閦鞞等上方大日如來等皆放清淨光明下方想金剛雄上呼字放忿怒光明而摧破之作是法時能令彼等必定得見善相當知彼罪障消滅若彼罪極重不見好相師應為說真實伽陀令其覺悟頌曰普賢真身遍一切能為世間自在王無始無終無生滅性相常住等虛空一切衆生所有心堅固菩提名薩埵心住不動三摩地精勤決定名金剛我今說此誠實言唯願世尊扶本願為利衆生諸悉地慈悲哀愍願加持說是語已復結金剛入契誦字密語一百八遍結金剛縛以禪智度捻檀慧度本間以進力度少屈相拄是也如是作法已若不見好相者但應引入授三昧耶不應與其灌頂次與當為受此密語三遍明莫加便誦加入佛三昧耶明十二唵鉢囉二合引底車𮧬日囉二合穀誦已令擲其華華所著處便受彼部尊密語當速成就花墮佛面佛眼等尊成就墮佛中分成就心真言花墮佛下分成就使者真言次念此密語三遍令弟子所結三昧耶印於其心上解之密語曰願金剛薩埵常住堅固加持我心願授與我一切悉地金剛解脫真言十三唵引底瑟他二合𮧬日囉二合儞哩二合住宅反引迷引婆去嚩二舍引濕嚩二合妬引迷婆去嚩三紇哩二合捺琰引迷引遏地瑟他二合四薩嚩悉地土萆反攝迷一鉢囉二合拽車五吽引賀賀賀賀穀引六次誦此密語解所掩眼物密語曰所擲花安頂上薩埵攝受汝疾成諸悉地十四唵引一𮧬日囉二合薩怛嚩二合娑嚩二合延帝引儞曳二合斫乞芻二合彈舌引半呼上娜伽去吒曩三答播二合嚧嗢半引伽去引吒野底四薩嚩惡乞芻二合𮧬日囉二合斫乞芻二合遏努怛爛引六係引𮧬日囉二合鉢者七金剛薩埵親自專為汝開於五眼無上金剛眼次呼弟子遍示壇中諸部事相由此法故為一切如來之所攝受護念金剛薩埵常住其心中隨彼所求乃至執金剛身無不獲得漸當得入一切如來體性法中若見此曼荼羅無量俱胝劫所積衆罪業由是悉除滅次當引所灌頂者左足踏華門右足踏華心入天帝方門華臺上坐以種種華塗香燒香燈明幡蓋清妙音樂而為供養如不辨者隨力作之所以爾者謂此人坐佛位故復以種種讚詠歌歎令其殷重生歡喜心說此頌曰諸佛覩史下生時釋梵龍神隨侍衛種種勝妙吉祥事願汝今時盡能得迦毗羅衛誕釋宮龍王霔沐甘露水諸天供養吉祥事願汝灌頂亦如是金剛座上為群生後夜降魔成正覺現諸希有吉祥事願汝此座悉能成波羅奈苑河莊嚴為五仙人開妙法成就無量吉祥事願汝今時盡獲得諸佛大悲方便海普利法界衆生海盡未來際無疲倦四無礙智汝當得若更有餘讚頌隨意作之勸發勝心令生利喜次應與其灌頂先想弟子頂有字放大光焰熾然赫奕又想弟子心中有月輪月輪內有八葉蓮華於華臺上亦有字若得金剛部於字內想有五股金剛餘部可知若得大日即想窣堵波應想己身如毗盧遮那像執弟子所得部瓶各想其部物體在瓶水內如金剛蓮等各令結其所得部契置於頂上誦本部密語七遍而用灌頂真言曰金剛部灌頂十五唵引一𮧬日囉薩怛嚩二合引避詵去者吽唵引𮧬日囉喇怛曩二合引避詵者怛𠸪二合唵引𮧬日囉二合鉢納磨二合引避詵者紇哩二合引唵引𮧬日囉二合羯磨引避詵者惡於彼額上想有攞字色如真金於兩目上各有羅上字其色如火上有光焰其兩足間想種種色為法輪相八輻莊嚴次誦金剛薩埵心真言加持塗香塗彼胸前所以作法加持者為令弟子如金剛薩埵故次結大日印念本真言置契於彼心上次額次喉次頂上即應諦想一切如來祕密勝上頭冠加彼頭上即結如上四種鬘印各隨其部法以繫其額若作阿闍梨灌頂法者應次第如上法遍用五瓶以四種鬘鱗次繫其額上已次師以觀羽執五股跋折羅授其雙手應以種種方便言詞開誘安慰為說頌曰諸佛金剛灌頂儀汝已如法灌頂竟為成如來體性故汝應受此金剛杵誦此偈已真言曰十六唵引一𮧬日囉二合引地鉢底二微怛嚩二合引避詵去者彌三底瑟侘二合𮧬日囉二合三摩耶薩怛鑁復收取金剛杵若是寶部者又跋折羅上想有寶珠餘部效此誦前真言時應改初句金剛字為寶珠餘部準此次於弟子本名上加金剛字依名呼之應誦此真言十七唵一𮧬日囉二合薩怛嚩二合引避詵去者引彌二𮧬日囉二合曩麼引入避曬訖帝三系𮧬日囉曩引麼引四又以香華種種供具供養所灌頂者師應執小金剛杵子如治眼法拭其兩目而告之言善男子世間醫王能除眼翳今日諸佛如來為汝開無明翳亦復如是為令汝得金剛智慧眼見法實相故次復執鏡令其觀照為顯諸法性相空寂說伽陀曰一切諸法性垢淨不可得非實亦非虛皆從因緣現應當知諸法自性無所依汝今真佛子廣利諸衆生師於弟子當生恭敬以此人能紹諸佛種性故師應授以商佉而告之言自今已後諸佛法輪汝應轉之當吹無上法螺令大法聲遍一切處不應於此法中而生疑怖於諸密語究竟清淨修行理趣汝應廣為衆生方便開示善男子諦聽若能如是修者一切如來皆悉知汝能報佛恩是故於一切時處一切持金剛者之所衛護令汝安樂次應引起至大壇前為說三昧耶令其堅固告言善男子汝應堅守正法設遭逼迫苦惱乃至斷命不應捨離修菩提心於求法人及於財物不應慳吝於諸衆生少不利益事亦不應作此是最上句義聖所行處我今為汝具足說竟汝應隨順如說修行弟子應自慶幸合掌頂禮又執五股金剛杵而授與之告言此是諸佛體性金剛薩埵手所執者汝應堅護禁戒常受持之弟子受已授此決定要誓密語令其誦之密語曰十八唵一引薩嚩怛他引蘖多悉地𮧬日囉二合三摩耶底瑟他二合二翳娑怛嚩二合引三馱囉耶彌四𮧬日囉二合薩怛嚩二合五呬呬呬呬吽如是作法己所有一切曼拏囉祕密三昧耶智師應教授若弟子於三昧耶有退失者師應遮制勿令毀壞弟子於師應恭敬尊重莫見師短於同學所莫生嫌恨應告之言汝於一切衆生常生慈愍哀矜示誨莫生厭離為說偈言三界極重罪不過於厭離汝於貪欲處莫生厭離心次欲令弟子堅持歡喜故復說偈曰此等三昧耶諸佛為汝說守持善愛護當如保身命弟子受師教己頂禮師足白言如師教誨我誓修行回向發願弟子某甲等向者己來於大悲胎藏大曼荼羅前聽聞正法生淨信心稽請聖賢海會聖衆歸依三寶懺除罪垢受佛淨戒投華有緣蒙聖攝受已得灌頂金剛職號隨賢聖位功德無邊塵沙叵算總將回施法界衆生願皆離苦得安穩樂捨邪歸正發菩提心行菩薩道永不退轉於當來世一時成佛消除無明妄三業現得薩埵心月輪決定不退三密行自他圓滿成悉地寬政十二年庚申晚秋為充足豐山印刻之未滿據相承之本且讐挍四五之別本而點之河南藥樹山沙門真常志享和改元辛酉年五月更以京師智積院之本挍整彼奧批云右阿闍梨灌頂儀軌一卷梵文句義舊本所無今守師授私加書之但厥句義全依四卷略出經注繕寫之次披閲過數文苑蕪穢義路不通推之祕其事相往往爛脫因以菅窺猥點一班負識遮梨希下雌黃云元祿庚午三年中秋念有三日內州教興徒慧光志行年二十五如是梵文句義後之增加然傳寫久間闕句義或唯有梵脫漢譯待復挍善本豐山總持院沙門快道識􅞣􅁤􅞣􅑉􅇚􅞣
