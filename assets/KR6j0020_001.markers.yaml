  - {type: variant, offset: 3744, length: 215, content: '寬政十二年庚申晚秋，為充足豐山印刻之未滿，據相承之本，且讐挍四五之別本而點之。

      　　　河南藥樹山沙門真常誌

      享和改元辛酉年五月，更以京師智積院之本挍整。彼奧批云：「右阿闍梨灌頂儀軌一卷，梵文句義舊本所無，今守師授，私加書之，但厥句義，全依四卷略出經註。繕寫之次披閱過數，文苑蕪穢，義路不通。推之，祕其事相往往爛脫，因以菅窺猥點一班。」負識遮梨希下雌黃云：「元祿庚午三年中秋念有三日」內州教興徒慧光志行年二十五：「如是，梵文句義後之增加，然傳寫久間闕句義，或唯有梵脫漢譯，待復挍善本。」　豐山　總持院沙門快道識', 甲: '', 乙: '', 丙: ''}
