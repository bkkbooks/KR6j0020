  - {type: variant, offset: 3716, length: 28, content: '消除無明妄＝忌【甲】【乙】妄【大】，忌【甲】【乙】妄忌三業，現得薩埵心月輪，

      決定不退三密行，自他圓滿成悉地。', 丙: ''}
